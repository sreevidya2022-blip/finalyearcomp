[build]
builder = "nixpacks"
buildCommand = "pip3 install -r requirements.txt"

[deploy]
startCommand = "gunicorn app:app --bind 0.0.0.0:${PORT:-8080} --workers 1 --timeout 120"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
